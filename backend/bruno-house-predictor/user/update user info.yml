info:
  name: update user info
  type: http
  seq: 2

http:
  method: PATCH
  url: http://localhost:8080/api/users/me
  body:
    type: json
    data: |-
      {
        "name": "user"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
