info:
  name: update password
  type: http
  seq: 3

http:
  method: PATCH
  url: http://localhost:8080/api/users/me/password
  body:
    type: json
    data: |-
      {
        "oldPassword": "user123",
        "newPassword": "user123"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
